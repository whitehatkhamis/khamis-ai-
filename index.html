<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khamis AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-dark': '#0f0f13',
            'sidebar-dark': '#111118',
            'card-dark': '#1c1c24',
            'border-dark': '#22222a',
            'purple-accent': '#7c3aed'
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
   .gradient-text { background: linear-gradient(90deg,#60a5fa,#a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
  <!-- MONETAG ADS SCRIPT - REPLACE YOUR-ZONE-ID -->
  <script src='//libtl.com/sdk.js' data-zone='YOUR-ZONE-ID' data-sdk='show_'></script> 
</head>
<body class="bg-bg-dark text-white">

  <div class="flex h-screen">
    <!-- SIDEBAR DESKTOP -->
    <aside class="hidden md:flex w-64 bg-sidebar-dark border-r border-border-dark flex-col p-3">
      <div class="flex items-center gap-2 font-bold text-lg mb-4">
        <svg class="w-6 h-6 text-purple-accent" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        Khamis AI
      </div>

      <button id="newChatBtn" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-lg py-2 mb-4 font-semibold">+ New Chat</button>
      
      <nav class="flex flex-col gap-1 text-sm">
        <a href="#" class="flex items-center gap-3 p-2 rounded-md bg-card-dark">🏠 Home</a>
        <a href="#" class="flex items-center gap-3 p-2 rounded-md hover:bg-card-dark">🧭 Explore</a>
        <a href="#" class="flex items-center gap-3 p-2 rounded-md hover:bg-card-dark">📚 Library</a>
      </nav>

      <!-- EARN CREDITS BOX -->
      <div class="mt-auto p-3 rounded-lg bg-card-dark text-sm">
        <div class="flex justify-between font-semibold mb-2">
          <span>Credits: <span id="creditCount">5</span></span>
          <button id="earnBtn" class="text-purple-accent text-xs font-bold">Earn +</button>
        </div>
        <button id="premiumBtn" class="w-full text-xs bg-purple-accent text-white py-1.5 rounded-md mt-1 font-semibold">Go Unlimited ₦300</button>
      </div>

      <div class="flex items-center gap-2 mt-3 p-2 rounded-lg hover:bg-card-dark">
        <img src="https://ui-avatars.com/api/?name=Guest&background=7c3aed&color=fff" class="w-8 h-8 rounded-full">
        <div>
          <div class="text-sm font-semibold">Guest User</div>
          <div class="text-xs bg-purple-accent text-white px-2 rounded-full inline-block">Free</div>
        </div>
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="flex-1 flex-col h-screen">
      <!-- TOPBAR -->
      <div class="flex justify-between items-center p-3 border-b border-border-dark bg-bg-dark z-20 shrink-0">
        <div class="flex items-center gap-2">
          <button id="backBtn" class="p-2 rounded-md hover:bg-card-dark">⬅️</button>
          <div class="font-bold flex items-center gap-2 text-lg">
            <svg class="w-6 h-6 text-purple-accent" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            Khamis AI
          </div>
        </div>
        <button id="themeToggle" class="p-2 rounded-md hover:bg-card-dark text-xl">✨</button>
      </div>

      <!-- CHAT MESSAGES - SCROLL AREA ONLY -->
      <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32">
        <div id="welcome" class="flex flex-col items-center justify-center h-full text-center pt-10">
          <div class="w-14 h-14 bg-card-dark rounded-2xl flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-purple-accent" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          </div>
          <h1 class="text-3xl font-bold gradient-text">My name is Khamis AI</h1>
          <p class="text-gray-400 mt-2">How can I help you today?</p>
          
          <div class="flex gap-2 mt-6 flex-wrap justify-center">
            <button class="quickBtn px-4 py-2 rounded-xl bg-card-dark text-sm hover:bg-[#2a2a35]">💡 Get ideas</button>
            <button class="quickBtn px-4 py-2 rounded-xl bg-card-dark text-sm hover:bg-[#2a2a35]">✍️ Write something</button>
            <button class="quickBtn px-4 py-2 rounded-xl bg-card-dark text-sm hover:bg-[#2a2a35]">📊 Analyze data</button>
            <button class="quickBtn px-4 py-2 rounded-xl bg-card-dark text-sm hover:bg-[#2a2a35]">🖼️ Upload Photo</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- INPUT BOX - FIXED TO BOTTOM -->
  <div class="fixed bottom-0 left-0 right-0 md:left-64 p-3 md:p-4 bg-gradient-to-t from-bg-dark via-bg-dark/95 to-transparent z-30">
    <div class="max-w-3xl mx-auto bg-card-dark rounded-2xl p-3 border-border-dark shadow-2xl">
      <div id="imagePreview" class="hidden mb-2 relative">
        <img id="previewImg" class="w-20 h-20 object-cover rounded-lg">
        <button id="removeImg" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs">x</button>
      </div>
      <textarea id="userInput" rows="1" placeholder="Message Khamis AI..." class="w-full bg-transparent outline-none resize-none max-h-40 text-base"></textarea>
      <div class="flex justify-between items-end mt-2"> <!-- FIXED: items-end for send icon balance -->
        <div class="flex items-center gap-2 text-sm text-gray-400">
          <input type="file" id="imageUpload" accept="image/*" class="hidden">
          <button id="uploadBtn" class="p-2 hover:bg-[#2a2a35] rounded-md">📎</button>
          <select id="modelSelect" class="bg-transparent outline-none text-xs">
            <option>llama-4-scout</option>
          </select>
        </div>
        <button id="sendBtn" class="w-10 h-10 bg-purple-accent rounded-full flex items-center justify-center text-white hover:opacity-90 shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
    <!-- REMOVED: "AI can make mistakes..." text -->
  </div>

  <!-- EARN MODAL -->
  <div id="earnModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-card-dark rounded-2xl p-5 w-full max-w-sm">
      <h2 class="text-lg font-bold mb-4">Earn Free Credits</h2>
      <div class="space-y-2 text-sm">
        <button onclick="earnAd()" class="w-full text-left p-3 bg-[#2a2a35] rounded-lg hover:bg-[#333]">📺 Watch Ad +5 Credits</button>
        <button onclick="inviteFriend()" class="w-full text-left p-3 bg-[#2a2a35] rounded-lg hover:bg-[#333]">🤝 Invite Friend +10 Credits</button>
        <button onclick="followChannel()" class="w-full text-left p-3 bg-[#2a2a35] rounded-lg hover:bg-[#333]">📢 Follow WhatsApp +3 Credits</button>
      </div>
      <button onclick="earnModal.classList.add('hidden')" class="w-full mt-4 p-2 bg-[#333] rounded-lg">Close</button>
    </div>
  </div>

<script>
  // THEME
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  let themeMode = localStorage.getItem('theme') || 'dark';
  function applyTheme() { html.classList.add('dark'); themeToggle.textContent = '🌙'; }
  applyTheme();
  themeToggle.onclick = () => { alert('Dark Mode Only'); }

  // MONEY SYSTEM
  const FREE_START_CREDITS = 5;
  const EARN_AD_CREDITS = 5;
  const EARN_INVITE_CREDITS = 10;
  const PHOTO_COST = 2;

  let userData = JSON.parse(localStorage.getItem('khamisAI_v5')) || { 
    credits: FREE_START_CREDITS, 
    date: new Date().toDateString(),
    invited: [],
    isPremium: false 
  };

  if(!userData.isPremium && userData.date!== new Date().toDateString()) {
    userData.credits = FREE_START_CREDITS;
    userData.date = new Date().toDateString();
  }
  const isPremium = userData.isPremium;

  function saveData() {
    localStorage.setItem('khamisAI_v5', JSON.stringify(userData));
    updateUI();
  }
  function updateUI() {
    document.getElementById('creditCount').textContent = isPremium? '∞' : userData.credits;
    if(!isPremium && userData.credits <= 0) {
      sendBtn.disabled = true;
      userInput.placeholder = 'Out of credits. Click Earn +';
    } else {
      sendBtn.disabled = false;
      userInput.placeholder = 'Message Khamis AI...';
    }
  }
  function spendCredit(isImg=false) {
    if(isPremium) return true;
    const cost = isImg? PHOTO_COST : 1;
    if(userData.credits < cost) {
      earnModal.classList.remove('hidden');
      return false;
    }
    userData.credits -= cost;
    saveData();
    return true;
  }
  function addCredits(amount) { userData.credits += amount; saveData(); }

  // EARN TASKS
  const earnModal = document.getElementById('earnModal');
  document.getElementById('earnBtn').onclick = () => earnModal.classList.remove('hidden');
  
  window.earnAd = () => {
    if(typeof show_ === 'function') { show_().then(() => { addCredits(EARN_AD_CREDITS); alert(`+${EARN_AD_CREDITS} Credits!`); earnModal.classList.add('hidden'); }); } 
    else { alert('Ad system loading... Try again.'); }
  }
  window.inviteFriend = () => {
    const myLink = `${window.location.origin}?ref=${Math.random().toString(36).substr(2, 9)}`;
    navigator.clipboard.writeText(myLink);
    alert('Link copied! Share it. You get +10 when they join.');
  }
  window.followChannel = () => {
    window.open('https://whatsapp.com/channel/YOUR_CHANNEL_LINK'); // REPLACE YOUR LINK
    addCredits(3);
    earnModal.classList.add('hidden');
  }

  // REFERRAL
  const urlParams = new URLSearchParams(window.location.search);
  const ref = urlParams.get('ref');
  if(ref &&!userData.invited.includes(ref)) {
    userData.invited.push(ref);
    addCredits(EARN_INVITE_CREDITS);
    alert(`Welcome! +${EARN_INVITE_CREDITS} credits from a friend.`);
    window.history.replaceState({}, document.title, "/");
  }
  
  document.getElementById('premiumBtn').onclick = () => window.open('https://paystack.shop/pay/YOUR-LINK'); // REPLACE PAYSTACK LINK

  // CHAT LOGIC
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcome = document.getElementById('welcome');
  const imageUpload = document.getElementById('imageUpload');
  const uploadBtn = document.getElementById('uploadBtn');
  const imagePreview = document.getElementById('imagePreview');
  const previewImg = document.getElementById('previewImg');
  const removeImg = document.getElementById('removeImg');
  let base64Image = null;

  uploadBtn.onclick = () => imageUpload.click();
  imageUpload.onchange = e => {
    const file = e.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = () => { base64Image = reader.result; previewImg.src = base64Image; imagePreview.classList.remove('hidden'); }
      reader.readAsDataURL(file);
    }
  }
  removeImg.onclick = () => { base64Image = null; imagePreview.classList.add('hidden'); imageUpload.value = ''; }

  async function sendMessage() {
    const prompt = userInput.value.trim();
    if(!prompt &&!base64Image) return;
    if(!spendCredit(!!base64Image)) return; // Spend credit first
    
    welcome.style.display = 'none';
    addMsg(prompt || 'Uploaded an image', 'user', base64Image);
    userInput.value = '';
    userInput.style.height = 'auto';
    removeImg.click();
    addMsg('Thinking...', 'ai', null, true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, image: base64Image})
      });
      const data = await res.json();
      removeThinking();
      addMsg(data.text, 'ai');
    } catch(e) {
      removeThinking();
      addMsg('Error: ' + e.message, 'ai');
      addCredits(1); // Refund on error
    }
  }

  function addMsg(text, role, img=null, isThinking=false) {
    const wrapper = document.createElement('div');
    wrapper.className = `flex w-full my-2 ${role==='user'? 'justify-end' : 'justify-start'}`;
    const div = document.createElement('div');
    div.className = `max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed ${role==='user'? 'bg-purple-accent text-white rounded-br-lg' : 'bg-card-dark rounded-bl-lg'}`;
    if(img) div.innerHTML += `<img src="${img}" class="w-32 h-32 object-cover rounded-lg mb-2">`;
    div.innerHTML += `<div>${text}</div>`;
    if(isThinking) div.id = 'thinking';
    wrapper.appendChild(div);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function removeThinking() { document.getElementById('thinking')?.remove(); }

  sendBtn.onclick = sendMessage;
  userInput.addEventListener('keydown', e => { if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
  userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; });
  document.querySelectorAll('.quickBtn').forEach(btn => { btn.onclick = () => { userInput.value = btn.textContent.split(' ')[1]; sendMessage(); } });
  document.getElementById('newChatBtn').onclick = () => resetChat();
  document.getElementById('backBtn').onclick = () => resetChat();
  function resetChat(){ chatBox.innerHTML = ''; chatBox.appendChild(welcome); welcome.style.display = 'flex'; }
  updateUI();
</script>
</body>
</html>
