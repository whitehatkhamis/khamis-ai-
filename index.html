  <div class="fixed bottom-0 left-0 right-0 md:left-64 p-3 md:p-4 bg-gradient-to-t from-bg-light dark:from-bg-dark via-bg-light/95 dark:via-bg-dark/95 to-transparent z-20">

      </div>
      <textarea id="userInput" rows="1" placeholder="Message Khamis AI..." class="w-full bg-transparent outline-none resize-none max-h-40 text-base"></textarea>
      <div class="flex justify-between items-end mt-2">
        <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
          <input type="file" id="imageUpload" accept="image/*" class="hidden">
          <button id="uploadBtn" class="p-2 hover:bg-gray-200 dark:hover:bg-[#2a2a35] rounded-md">📎</button>
          <select id="modelSelect" class="bg-transparent outline-none text-xs">
            <option>llama-4-scout</option>
          </select>
        </div>
        <button id="sendBtn" class="w-10 h-10 bg-purple-accent rounded-full flex items-center justify-center text-white hover:opacity-90 shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>

  <div id="earnModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-card-light dark:bg-card-dark rounded-2xl p-5 w-full max-w-sm">
      <h2 class="text-lg font-bold mb-4">Earn Free Credits 💰</h2>
      <div class="space-y-2 text-sm">
        <button onclick="earnAd()" class="w-full text-left p-3 bg-gray-100 dark:bg-[#2a2a35] rounded-lg hover:bg-gray-200 dark:hover:bg-[#333]">📺 Watch Ad +5 Credits</button>
      </div>
      <button onclick="earnModal.classList.add('hidden')" class="w-full mt-4 p-2 bg-gray-200 dark:bg-[#333] rounded-lg">Close</button>
    </div>
  </div>

<script>
  // 1. THEME: LIGHT / DARK / SYSTEM
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  let themeMode = localStorage.getItem('khamisAI_theme') || 'system';
  
  function applyTheme() {
    if(themeMode === 'system') {
      html.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
      html.classList.toggle('light',!window.matchMedia('(prefers-color-scheme: dark)').matches);
      themeToggle.textContent = '✨';
    } else {
      html.classList.toggle('dark', themeMode === 'dark');
      html.classList.toggle('light', themeMode === 'light');
      themeToggle.textContent = themeMode === 'dark'? '🌙' : '☀️';
    }
  }
  applyTheme();
  themeToggle.onclick = () => {
    themeMode = themeMode === 'dark'? 'light' : themeMode === 'light'? 'system' : 'dark';
    localStorage.setItem('khamisAI_theme', themeMode);
    applyTheme();
  }

  // 2. MONEY SYSTEM
  const FREE_START_CREDITS = 5;
  const EARN_AD_CREDITS = 5;
  const PHOTO_COST = 2;

  let userData = JSON.parse(localStorage.getItem('khamisAI_v6')) || { 
    credits: FREE_START_CREDITS, 
    date: new Date().toDateString(),
    isPremium: false,
    limitMessageShown: false
  };

  if(!userData.isPremium && userData.date!== new Date().toDateString()) {
    userData.credits = FREE_START_CREDITS;
    userData.date = new Date().toDateString();
    userData.limitMessageShown = false;
  }
  const isPremium = userData.isPremium;

  function saveData() {
    localStorage.setItem('khamisAI_v6', JSON.stringify(userData));
    updateUI();
  }
  function updateUI() {
    document.getElementById('creditCount').textContent = isPremium? '∞' : userData.credits;
    document.getElementById('creditCountTop').textContent = isPremium? '∞' : userData.credits;
    if(!isPremium && userData.credits <= 0) {
      sendBtn.disabled = true;
      userInput.placeholder = 'Out of credits. Tap Earn +';
    } else {
      sendBtn.disabled = false;
      userInput.placeholder = 'Message Khamis AI...';
    }
  }
  function spendCredit(isImg=false) {
    if(isPremium) return true;
    const cost = isImg? PHOTO_COST : 1;
    if(userData.credits < cost) {
      if(!userData.limitMessageShown) {
        addMsg("You’ve reached your daily limit. Tap Earn + above to watch an ad and get more credits ehh 💰", 'ai');
        userData.limitMessageShown = true;
        saveData();
      }
      earnModal.classList.remove('hidden');
      return false;
    }
    userData.credits -= cost;
    saveData();
    return true;
  }
  function addCredits(amount) { 
    userData.credits += amount; 
    userData.limitMessageShown = false;
    saveData(); 
  }

  // 3. EARN TASKS - FIXED FOR libtl.com SDK
  const earnModal = document.getElementById('earnModal');
  document.getElementById('earnBtn').onclick = () => earnModal.classList.remove('hidden');
  document.getElementById('earnBtnTop').onclick = () => earnModal.classList.remove('hidden');
  
  window.earnAd = () => {
    earnModal.classList.add('hidden');
    if(typeof show_9456932 === 'function') { 
      show_9456932().then(() => { 
        addCredits(EARN_AD_CREDITS); 
        addMsg(`+${EARN_AD_CREDITS} Credits Added! You can chat again now ✅`, 'ai'); 
      }).catch(() => { addMsg('Ad was closed. Try again.', 'ai'); });
    } else { 
      addMsg('Ad loading... Click Earn again in 2 seconds.', 'ai'); 
      setTimeout(() => { if(typeof show_9456932 === 'function') earnAd(); }, 2000);
    }
  }
  
  document.getElementById('premiumBtn').onclick = () => window.open('https://paystack.shop/pay/YOUR-LINK'); // REPLACE PAYSTACK LINK

  // 4. SIDEBAR MOBILE TOGGLE
  const sidebar = document.getElementById('sidebar');
  const menuBtn = document.getElementById('menuBtn');
  const overlay = document.getElementById('overlay');
  function toggleSidebar() {
    sidebar.classList.toggle('hidden');
    overlay.classList.toggle('hidden');
  }
  menuBtn.onclick = toggleSidebar;
  overlay.onclick = toggleSidebar;

  // 5. CHAT LOGIC
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcome = document.getElementById('welcome');
  const imageUpload = document.getElementById('imageUpload');
  const uploadBtn = document.getElementById('uploadBtn');
  const imagePreview = document.getElementById('imagePreview');
  const previewImg = document.getElementById('previewImg');
  const removeImg = document.getElementById('removeImg');
  let base64Image = null;

  uploadBtn.onclick = () => imageUpload.click();
  imageUpload.onchange = e => {
    const file = e.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = () => { base64Image = reader.result; previewImg.src = base64Image; imagePreview.classList.remove('hidden'); }
      reader.readAsDataURL(file);
    }
  }
  removeImg.onclick = () => { base64Image = null; imagePreview.classList.add('hidden'); imageUpload.value = ''; }

  async function sendMessage() {
    const prompt = userInput.value.trim();
    if(!prompt &&!base64Image) return;
    if(!spendCredit(!!base64Image)) return;
    
    welcome.style.display = 'none';
    addMsg(prompt || 'Uploaded an image', 'user', base64Image);
    userInput.value = '';
    userInput.style.height = 'auto';
    removeImg.click();
    addMsg('Thinking...', 'ai', null, true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, image: base64Image})
      });
      const data = await res.json();
      removeThinking();
      addMsg(data.text, 'ai');
    } catch(e) {
      removeThinking();
      addMsg('Error: ' + e.message, 'ai');
      addCredits(1);
    }
  }

  function addMsg(text, role, img=null, isThinking=false) {
    const wrapper = document.createElement('div');
    wrapper.className = `flex w-full my-2 ${role==='user'? 'justify-end' : 'justify-start'}`;
    const div = document.createElement('div');
    div.className = `max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed ${role==='user'? 'bg-purple-accent text-white rounded-br-lg' : 'bg-gray-100 dark:bg-card-dark rounded-bl-lg'}`;
    if(img) div.innerHTML += `<img src="${img}" class="w-32 h-32 object-cover rounded-lg mb-2">`;
    div.innerHTML += `<div>${text}</div>`;
    if(isThinking) div.id = 'thinking';
    wrapper.appendChild(div);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function removeThinking() { document.getElementById('thinking')?.remove(); }

  sendBtn.onclick = sendMessage;
  userInput.addEventListener('keydown', e => { if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
  userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; });
  document.querySelectorAll('.quickBtn').forEach(btn => { btn.onclick = () => { userInput.value = btn.textContent.split(' ')[1]; sendMessage(); } });
  document.getElementById('newChatBtn').onclick = () => resetChat();
  function resetChat(){ chatBox.innerHTML = ''; chatBox.appendChild(welcome); welcome.style.display = 'flex'; }
  updateUI();
</script>
</body>
