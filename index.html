<!DOCTYPE html>
<html lang="ha">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khamis AI - OpenRouter</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #0f172a; 
      color: #e2e8f0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0;
    }
    .container { 
      width: 90%; 
      max-width: 600px; 
      background: #1e293b; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; color: #38bdf8; }
    textarea { 
      width: 100%; 
      height: 120px; 
      background: #334155; 
      color: #e2e8f0; 
      border: 1px solid #475569; 
      border-radius: 8px; 
      padding: 10px; 
      font-size: 16px; 
      box-sizing: border-box;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: #38bdf8; 
      color: #0f172a; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: bold; 
      margin-top: 10px; 
      cursor: pointer;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    #response { 
      margin-top: 20px; 
      background: #334155; 
      padding: 15px; 
      border-radius: 8px; 
      min-height: 50px; 
      white-space: pre-wrap; /* Don sabbin layi suyi aiki */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Khamis AI ⚡</h1>
    <textarea id="prompt" placeholder="Rubuta tambayarka anan... misali: Ka rubuta mini poem na Hausa"></textarea>
    <button id="sendBtn">Aika</button>
    <div id="response">Amsa za ta bayyana anan...</div>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const responseEl = document.getElementById('response');

    sendBtn.addEventListener('click', async () => {
      const userPrompt = promptEl.value.trim();
      if (!userPrompt) return;

      sendBtn.disabled = true;
      responseEl.textContent = 'AI na tunani...';

      try {
        const res = await fetch('/api/chat', { // <-- WANNAN YANA MAGANA DA `api/chat.js`
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: userPrompt })
        });

        const data = await res.json();
        
        if (!res.ok) {
            throw new Error(data.error || 'Kuskure ya faru');
        }

        responseEl.textContent = data.text;
      } catch (error) {
        responseEl.textContent = 'Kuskure: ' + error.message;
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
