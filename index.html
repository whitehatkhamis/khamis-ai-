<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khamis AI</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
 .chat { width: 100%; max-width: 500px; height: 90vh; background: #1c1c1c; border-radius: 12px; display: flex; flex-direction: column; }
 .header { padding: 15px; background: #000; border-radius: 12px 12px 0 0; font-weight: bold; }
 .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
 .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; }
 .user { background: #007aff; align-self: flex-end; }
 .bot { background: #333; align-self: flex-start; }
 .input { display: flex; padding: 10px; border-top: 1px solid #333; }
 .input input { flex: 1; padding: 10px; border: none; background: #222; color: #fff; border-radius: 8px; }
 .input button { margin-left: 10px; padding: 10px 15px; border: none; background: #007aff; color: #fff; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="chat">
  <div class="header">Khamis AI 🔥</div>
  <div class="msgs" id="msgs">
    <div class="msg bot">Sannu! Ni ne Khamis AI. Tambaye ni komai 👊</div>
  </div>
  <div class="input">
    <input id="inp" placeholder="Rubuta sakonka...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');

async function send() {
  const text = inp.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  inp.value = '';
  addMsg('...', 'bot', true); // Loading

  try {
    const res = await fetch('/api/gemini', { // Muna magana da Proxy namu
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    updateLastMsg(data.reply || 'Na samu kuskure 😅');
  } catch {
    updateLastMsg('Network Error. Duba intanet naka.');
  }
}

function addMsg(text, who, loading=false) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  if(loading) div.id = 'loading';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function updateLastMsg(text) {
  const loading = document.getElementById('loading');
  if(loading) {
    loading.textContent = text;
    loading.id = '';
  }
}
inp.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
